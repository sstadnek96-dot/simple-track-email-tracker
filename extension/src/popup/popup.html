<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Simple Track</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <img class="brand-mark" src="../../assets/brand/simple-track-logo.svg" alt="">
          <div>
            <h1>Simple Track</h1>
            <p>Gmail and Outlook tracking</p>
          </div>
        </div>
        <button class="icon-button" id="openOptions" type="button" aria-label="Open web app" title="Open web app">
          <span class="settings-icon" aria-hidden="true"></span>
        </button>
      </header>

      <section class="account-panel" id="accountPanel" aria-live="polite">
        <span class="account-avatar" id="accountAvatar">ST</span>
        <div class="account-copy">
          <strong id="accountEmail">Detecting mail account</strong>
          <span id="accountStatus">Open Gmail or Outlook to connect tracking.</span>
        </div>
        <div class="account-actions">
          <button class="account-action" id="connectAccount" type="button">Connect</button>
          <button class="account-action secondary" id="disconnectAccount" type="button">Log out</button>
        </div>
      </section>

      <section class="account-switcher" id="accountSwitcher" hidden>
        <button class="account-switcher-trigger" id="accountSwitcherTrigger" type="button" aria-haspopup="listbox" aria-expanded="false">
          <span class="account-switcher-avatar" id="accountSwitcherAvatar">ST</span>
          <span class="account-switcher-copy">
            <small>Viewing</small>
            <strong id="accountSwitcherLabel">Connected account</strong>
          </span>
          <span class="account-switcher-caret" aria-hidden="true"></span>
        </button>
        <div class="account-switcher-menu" id="accountSwitcherMenu" role="listbox" aria-label="Connected mail accounts"></div>
      </section>

      <div class="toolbar">
        <label class="search-box">
          <span class="search-icon" aria-hidden="true"></span>
          <input id="searchInput" type="search" placeholder="Search subject or recipient">
        </label>
        <label class="switch" title="Tracking">
          <input id="trackingToggle" type="checkbox">
          <span></span>
        </label>
      </div>

      <nav class="tabs" aria-label="Message filters">
        <button class="tab is-active" data-filter="all" type="button">All</button>
        <button class="tab" data-filter="opened" type="button">Opened</button>
        <button class="tab" data-filter="unopened" type="button">Unread</button>
        <button class="tab" data-filter="clicked" type="button">Clicks</button>
        <button class="tab" data-filter="files" type="button">Files</button>
      </nav>

      <section class="activity-list" id="activityList" aria-label="Tracked messages"></section>
    </main>

    <template id="messageTemplate">
      <details class="message-card">
        <summary class="message-summary">
          <div class="message-copy">
            <div class="message-line">
              <strong class="recipients"></strong>
              <time></time>
            </div>
            <p class="activity"></p>
            <span class="status-pill"></span>
          </div>
          <span class="chevron" aria-hidden="true"></span>
          <button class="delete-button" type="button" aria-label="Remove from popup" title="Remove">
            <img class="delete-icon" src="../../assets/icons/trash-2.svg" alt="">
          </button>
        </summary>
        <div class="message-report">
          <div class="report-metrics">
            <span><strong class="opens"></strong><em>Opens</em></span>
            <span><strong class="clicks"></strong><em>Clicks</em></span>
            <span><strong class="attachment-opens"></strong><em>Files</em></span>
            <span><strong class="status-value"></strong><em>Status</em></span>
          </div>
          <div class="event-section">
            <div class="event-heading">
              <strong>Event timeline</strong>
              <span class="event-count"></span>
            </div>
            <ol class="event-timeline"></ol>
          </div>
          <dl class="report-details">
            <div>
              <dt>Subject</dt>
              <dd class="subject"></dd>
            </div>
            <div>
              <dt>Last activity</dt>
              <dd class="last-activity"></dd>
            </div>
          </dl>
          <div class="report-actions">
            <button class="web-report-button" type="button">Open in web app</button>
            <button class="mute-button" type="button"></button>
          </div>
        </div>
      </details>
    </template>

    <script src="popup.js"></script>
  </body>
</html>
